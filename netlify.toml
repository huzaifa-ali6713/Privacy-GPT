[build]
  base      = "."
  command   = "npm install -g pnpm@9 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/chatbot run build:netlify"
  publish   = "artifacts/chatbot/dist"

[build.environment]
  NODE_VERSION  = "20"
  BASE_PATH     = "/"
  NODE_ENV      = "production"

[functions]
  directory     = "netlify/functions"
  node_bundler  = "esbuild"

[functions."api"]
  timeout = 30

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
